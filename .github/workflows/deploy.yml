name: Continuous Deployment Pipeline

on:
  push:
    branches: [ "main" ]

jobs:
  # --- JOB 1: CONTROL DE CALIDAD (CI) ---
  test_and_lint:
    name: Test and Lint Code
    runs-on: ubuntu-latest 
    steps:
      - name: Checkout Code Repository
        uses: actions/checkout@v4 

      - name: Setup Python
        uses: actions/setup-python@v5 
        with:
          python-version: '3.11'

      - name: Install Dependencies
        run: pip install -r app/requirements.txt 

      - name: Check Python Syntax
        run: python -m compileall app/


  # --- JOB 2: DESPLIEGUE SEGURO (CD) ---
  deploy:
    name: Deploy Application to AWS EC2
    runs-on: ubuntu-latest
    needs: test_and_lint 
    steps:
      - name: Executing Remote SSH Commands to Deploy
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ubuntu
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            if [ ! -d "devops-portfolio" ]; then
              git clone https://github.com/${{ github.repository }}.git
              cd devops-portfolio
            else
              cd devops-portfolio
              git pull origin main
            fi
                                  
            # ✅ ENABLE BUILDKIT FOR CLASSIC DOCKER COMPOSE
            export DOCKER_BUILDKIT=1
            export COMPOSE_DOCKER_CLI_BUILD=1
            
            # Use sudo explicitly to bypass permission denied errors
            sudo docker-compose down
            sudo docker-compose up -d --build
            sudo docker image prune -f