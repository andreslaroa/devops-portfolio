name: Continuous Deployment Pipeline

# Trigger the pipeline every time a push is made to the main branch
on:
  push:
    branches: [ "main" ]

jobs:
  deploy:
    name: Deploy Application to AWS EC2
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code Repository
      uses: actions/checkout@v4

    - name: Executing Remote SSH Commands to Deploy
      uses: appleboy/ssh-action@v1.0.3
      with:
        host: ${{ secrets.SERVER_IP }}
        username: ubuntu
        key: ${{ secrets.SSH_PRIVATE_KEY }}
        script: |
          # 1. Navigate to project folder or clone it if it doesn't exist
          if [ ! -d "devops-portfolio" ]; then
            git clone https://github.com/${{ github.repository }}.git
            cd devops-portfolio
          else
            cd devops-portfolio
            git pull origin main
          fi
          
          # 2. Run the application using Docker Compose in the cloud server
          sudo docker-compose down
          sudo docker-compose up -d --build
